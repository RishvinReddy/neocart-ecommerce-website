<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/263/263142.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - NeoCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                NeoCart
            </a>
        </div>
    </nav>
    <!-- CONTACT -->
    <section class="py-5">
        <div class="container">
            <div class="row">
                <!-- INFO -->
                <div class="col-lg-5 mb-4">
                    <h1 class="fw-bold mb-4">
                        Contact Us
                    </h1>
                    <p class="text-muted">
                        We’d love to hear from you. Reach out for support,
                        queries, or feedback.
                    </p>
                    <div class="mt-4">
                        <p>
                            📍 Hyderabad, India
                        </p>
                        <p>
                            📞 +91 9876543210
                        </p>
                        <p>
                            ✉ support@neocart.com
                        </p>
                    </div>
                </div>
                <!-- FORM -->
                <div class="col-lg-7">
                    <div class="shadow-sm p-4 rounded bg-white">
                        <form id="contactForm">
                            <div class="mb-3">
                                <label class="form-label">
                                    Name
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="name"
                                >
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Email
                                </label>
                                <input
                                    type="email"
                                    class="form-control"
                                    id="contactEmail"
                                >
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Subject
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="subject"
                                >
                            </div>
                            <div class="mb-4">
                                <label class="form-label">
                                    Message
                                </label>
                                <textarea
                                    class="form-control"
                                    rows="5"
                                    id="message"
                                ></textarea>
                            </div>
                            <button
                                type="submit"
                                class="btn btn-dark w-100 btn-lg"
                            >
                                Send Message
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script>
        $("#contactForm").submit(function(e){
            e.preventDefault();
            const name = $("#name").val().trim();
            const email = $("#contactEmail").val().trim();
            const subject = $("#subject").val().trim();
            const message = $("#message").val().trim();
            if(
                name === "" ||
                email === "" ||
                subject === "" ||
                message === ""
            ){
                alert("Please fill all fields");
                return;
            }
            const emailPattern =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailPattern.test(email)){
                alert("Invalid email address");
                return;
            }
            alert("Message sent successfully!");
            $("#contactForm")[0].reset();
        });
    </script>
</body>
</html>
