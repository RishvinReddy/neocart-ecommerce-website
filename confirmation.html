<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/263/263142.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - NeoCart</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="confirmation-section d-flex align-items-center">
        <div class="container text-center">
            <div class="confirmation-box shadow-lg p-5 rounded bg-white">
                <i class="bi bi-check-circle-fill text-success confirmation-icon"></i>
                <h1 class="fw-bold mt-4">
                    Order Placed Successfully!
                </h1>
                <p class="text-muted mt-3">
                    Thank you for shopping with NeoCart.
                </p>
                <h4 class="mt-4">
                    Order ID:
                    <span id="orderId"></span>
                </h4>
                <p class="mt-3">
                    Status:
                    <span class="badge bg-success">
                        Confirmed
                    </span>
                </p>
                <a href="index.html" class="btn btn-dark btn-lg mt-4">
                    Continue Shopping
                </a>
            </div>
        </div>
    </section>
    <script>
        const orderId =
            localStorage.getItem("orderId");
        document.getElementById("orderId").innerText =
            orderId;
    </script>
</body>
</html>
