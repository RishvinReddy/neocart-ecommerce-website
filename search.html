<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/263/263142.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Products - NeoCart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                NeoCart
            </a>
        </div>
    </nav>
    <!-- SEARCH -->
    <section class="py-5">
        <div class="container">
            <h1 class="fw-bold text-center mb-5">
                Search Products
            </h1>
            <!-- SEARCH BAR -->
            <div class="row justify-content-center mb-5">
                <div class="col-lg-6">
                    <input
                        type="text"
                        class="form-control form-control-lg"
                        id="searchBar"
                        placeholder="Search products..."
                    >
                </div>
            </div>
            <!-- PRODUCTS -->
            <div class="row g-4" id="searchProducts">
                <!-- PRODUCT -->
                <div
                    class="col-md-3 search-item"
                    data-name="smartphone"
                >
                    <div class="card shadow-sm h-100">
                        <img
                            src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
                            class="card-img-top"
                            alt=""
                        >
                        <div class="card-body">
                            <h5>
                                Smartphone
                            </h5>
                            <p class="text-muted">
                                ₹24,999
                            </p>
                        </div>
                    </div>
                </div>
                <!-- PRODUCT -->
                <div
                    class="col-md-3 search-item"
                    data-name="headphones"
                >
                    <div class="card shadow-sm h-100">
                        <img
                            src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e"
                            class="card-img-top"
                            alt=""
                        >
                        <div class="card-body">
                            <h5>
                                Headphones
                            </h5>
                            <p class="text-muted">
                                ₹4,499
                            </p>
                        </div>
                    </div>
                </div>
                <!-- PRODUCT -->
                <div
                    class="col-md-3 search-item"
                    data-name="running shoes"
                >
                    <div class="card shadow-sm h-100">
                        <img
                            src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
                            class="card-img-top"
                            alt=""
                        >
                        <div class="card-body">
                            <h5>
                                Running Shoes
                            </h5>
                            <p class="text-muted">
                                ₹2,999
                            </p>
                        </div>
                    </div>
                </div>
                <!-- PRODUCT -->
                <div
                    class="col-md-3 search-item"
                    data-name="tshirt"
                >
                    <div class="card shadow-sm h-100">
                        <img
                            src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518"
                            class="card-img-top"
                            alt=""
                        >
                        <div class="card-body">
                            <h5>
                                Casual T-Shirt
                            </h5>
                            <p class="text-muted">
                                ₹999
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script>
        const searchBar =
            document.getElementById("searchBar");
        const items =
            document.querySelectorAll(".search-item");
        searchBar.addEventListener("keyup", () => {
            const value =
                searchBar.value.toLowerCase();
            items.forEach(item => {
                const name =
                    item.dataset.name.toLowerCase();
                if(name.includes(value)){
                    item.style.display = "block";
                }else{
                    item.style.display = "none";
                }
            });
        });
    </script>
</body>
</html>
