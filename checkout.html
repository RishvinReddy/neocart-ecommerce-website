<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/263/263142.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - NeoCart</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                NeoCart
            </a>
        </div>
    </nav>
    <!-- CHECKOUT -->
    <section class="py-5">
        <div class="container">
            <h1 class="fw-bold text-center mb-5">
                Checkout
            </h1>
            <div class="row">
                <!-- FORM -->
                <div class="col-lg-7">
                    <div class="shadow-sm p-4 rounded bg-white">
                        <h3 class="mb-4">
                            Shipping Information
                        </h3>
                        <form id="checkoutForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        First Name
                                    </label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="firstName"
                                    >
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Last Name
                                    </label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="lastName"
                                    >
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Email
                                </label>
                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                >
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Phone Number
                                </label>
                                <input
                                    type="tel"
                                    class="form-control"
                                    id="phone"
                                >
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Address
                                </label>
                                <textarea
                                    class="form-control"
                                    rows="3"
                                    id="address"
                                ></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        City
                                    </label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="city"
                                    >
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Pincode
                                    </label>
                                    <input
                                        type="text"
                                        class="form-control"
                                        id="pincode"
                                    >
                                </div>
                            </div>
                            <!-- PAYMENT -->
                            <h4 class="mt-4 mb-3">
                                Payment Method
                            </h4>
                            <div class="form-check mb-2">
                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="payment"
                                    checked
                                >
                                <label class="form-check-label">
                                    Cash on Delivery
                                </label>
                            </div>
                            <div class="form-check mb-4">
                                <input
                                    class="form-check-input"
                                    type="radio"
                                    name="payment"
                                >
                                <label class="form-check-label">
                                    Credit/Debit Card
                                </label>
                            </div>
                            <!-- BUTTON -->
                            <button
                                type="submit"
                                class="btn btn-dark btn-lg w-100"
                            >
                                Place Order
                            </button>
                        </form>
                    </div>
                </div>
                <!-- ORDER SUMMARY -->
                <div class="col-lg-5">
                    <div class="checkout-summary shadow-sm p-4 rounded bg-white">
                        <h3 class="mb-4">
                            Order Summary
                        </h3>
                        <div id="checkoutItems">
                            <!-- DYNAMIC ITEMS -->
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-2">
                            <span>
                                Subtotal
                            </span>
                            <span id="checkoutSubtotal">
                                ₹0
                            </span>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>
                                Shipping
                            </span>
                            <span>
                                ₹199
                            </span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between fw-bold fs-5">
                            <span>
                                Total
                            </span>
                            <span id="checkoutTotal">
                                ₹0
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- JS -->
    <script src="js/checkout.js"></script>
</body>
</html>
